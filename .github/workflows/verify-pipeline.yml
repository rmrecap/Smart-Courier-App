name: Verify Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: 17
  GRADLE_VERSION: 8.2
  NODE_VERSION: 18
  ANDROID_API_LEVEL: 34
  ANDROID_TARGET: google_apis
  ANDROID_ARCH: x86_64
  FIREBASE_PROJECT: smart-courier-app-e8624

jobs:
  lint-and-compile:
    name: Lint + Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decode google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Check code style
        run: ./gradlew lint

      - name: Compile release
        run: ./gradlew assembleRelease

  e2e-tests:
    name: E2E Tests (Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Decode google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Start Firebase Emulators
        run: |
          firebase emulators:start \
            --project ${{ env.FIREBASE_PROJECT }} \
            --only auth,firestore,storage,database \
            > /tmp/firebase-emulators.log 2>&1 &
          echo "Waiting for emulators to be ready..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:4000 > /dev/null 2>&1; then
              echo "Emulators UI ready on port 4000"
              break
            fi
            echo "Attempt $i — waiting..."
            sleep 2
          done

      - name: Run connected Android tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_API_LEVEL }}
          target: ${{ env.ANDROID_TARGET }}
          arch: ${{ env.ANDROID_ARCH }}
          avd-name: ci-emulator
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          disable-animations: true
          script: |
            adb logcat -c
            ./gradlew connectedAndroidTest
            EXIT_CODE=$?
            adb logcat -d -s SyncWorker SyncEngineE2ETest:H
            exit $EXIT_CODE

      - name: Stop Firebase Emulators
        if: always()
        run: |
          firebase emulators:stop
          cat /tmp/firebase-emulators.log 2>/dev/null | tail -50

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}

      - name: Cache Gradle caches
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: '**/build/reports/tests/'
